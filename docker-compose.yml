services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nmbs-dashboard
    init: true
    ports:
      - "8050:8050"
    environment:
      - SNAPSHOT_ROOT=/app/examples/endpoint_snapshots
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8050', timeout=5).status < 500 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
